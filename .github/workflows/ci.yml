name: CI

on:
  push:
    branches: [ main ]
    paths:
      - "src/**"
      - "test/**"
      - "example/**"
      - "Project.toml"
      - "Manifest.toml"
      - "**/*.jl"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [ main ]
    paths:
      - "src/**"
      - "test/**"
      - "example/**"
      - "Project.toml"
      - "Manifest.toml"
      - "**/*.jl"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        julia-version: ['1.10', '1.11', '1.12']
    steps:
      - uses: actions/checkout@v7

      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ matrix['julia-version'] }}

      - name: Instantiate and run tests
        env:
          JULIA_NUM_THREADS: 2
          JULIA_PKG_PRECOMPILE_AUTO: "0"
          # Instrument coverage on a single job only; the other 8 stay fast.
          COVERAGE: ${{ matrix.os == 'ubuntu-latest' && matrix['julia-version'] == '1.12' }}
        run: |
          julia --color=yes -e '
            using Pkg;
            Pkg.activate(pwd());
            Pkg.instantiate(; allow_autoprecomp=false);
            using Cross;
            Pkg.test(; coverage = get(ENV, "COVERAGE", "false") == "true");
          '

      - name: Process coverage
        if: ${{ matrix.os == 'ubuntu-latest' && matrix['julia-version'] == '1.12' }}
        uses: julia-actions/julia-processcoverage@v1

      - name: Upload coverage to Codecov
        if: ${{ matrix.os == 'ubuntu-latest' && matrix['julia-version'] == '1.12' }}
        uses: codecov/codecov-action@v7
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: unit
          fail_ci_if_error: false
